<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestion du personnel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body class="bg-light">
  <div class="container mt-4">
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-3">← Retour</a>

    <div class="card p-4 shadow mb-4">
      <h3 class="mb-3">Ajouter un Personnel</h3>

      <form method="POST">
        <div class="mb-3">
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Nom Prénom"
            required
          />
        </div>

        <div class="mb-3">
          <select name="role" class="form-select">
            <option value="agent">Agent</option>
            <option value="admin">Administrateur</option>
          </select>
        </div>

        <button type="submit" class="btn btn-danger w-100">Créer le compte</button>
      </form>
    </div>

    <h4 class="mb-3">Liste des membres</h4>

    <ul class="list-group shadow-sm">
      {% for a in agents %}
      <li class="list-group-item d-flex justify-content-between align-items-center gap-2 flex-wrap">
        <div>
          <div class="fw-semibold">{{ a.username }}</div>
          <div class="text-muted small">Rôle : {{ a.role }}</div>
        </div>

        <div class="d-flex align-items-center gap-2">
          <span class="badge bg-secondary">
            {{ "Nouveau" if a.must_change_password else "Actif" }}
          </span>

          {% if a.role == 'agent' %}
            <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin_manoeuvre_agent_history', user_id=a.id) }}">Historique manoeuvres</a>
            <form method="POST" action="{{ url_for('admin_delete_agent', user_id=a.id) }}"
                  onsubmit="return confirm('Supprimer définitivement le compte de cet agent ?');">
              <button type="submit" class="btn btn-sm btn-outline-danger">Supprimer</button>
            </form>
          {% endif %}
        </div>
      </li>
      {% endfor %}
    </ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
