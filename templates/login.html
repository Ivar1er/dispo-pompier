<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion - Caserne BLR</title>

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <style>
    /* login-bg */
    body.login-body { position: relative; overflow-x: hidden; }
    body.login-body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('{{ url_for('static', filename='logo.png') }}');
      background-repeat: no-repeat;
      background-position: center;
      background-size: min(70vw, 520px);
      opacity: .08;
      pointer-events: none;
      filter: grayscale(100%);
    }
    .login-card { position: relative; overflow: hidden; }
    .login-card::before {
      content: "";
      position: absolute;
      inset: -30px;
      background-image: url('{{ url_for('static', filename='logo.png') }}');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 85%;
      opacity: .06;
      pointer-events: none;
      filter: grayscale(100%);
    }
  </style>

</head>

<body class="login-body bg-dark d-flex align-items-center" style="min-height: 100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-lg p-5 login-card">
          <div class="text-center fw-semibold" style="letter-spacing:.3px;">CIS Beaune-la-Rolande</div>
          <div class="text-center text-muted mb-3" style="font-size:.95rem;">Planning de garde</div>
          <h2 class="text-center mb-4">Identification</h2>

          <form method="POST">
            <div class="mb-3">
              <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Identifiant"
                required
                autocomplete="username"
              >
            </div>

            <div class="mb-2">
              <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Mot de passe"
                required
                autocomplete="current-password"
              >
            </div>

            <div class="text-end mb-3">
              <button
                class="btn btn-link btn-sm p-0 text-decoration-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#forgotPasswordBox"
                aria-expanded="false"
                aria-controls="forgotPasswordBox"
              >
                Mot de passe oublié ?
              </button>
            </div>

            <button type="submit" class="btn btn-danger w-100">
              Se connecter
            </button>
          </form>

          <div class="collapse mt-3" id="forgotPasswordBox">
            <div class="card card-body bg-light">
              <div class="fw-semibold mb-2">Recevoir un mot de passe provisoire</div>
              <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="mb-2">
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Votre adresse email"
                    required
                    autocomplete="email"
                  >
                </div>
                <button type="submit" class="btn btn-outline-danger w-100">
                  Envoyer le mot de passe provisoire
                </button>
              </form>
            </div>
          </div>

          {# Optionnel : zone message si tu flashes des erreurs côté Flask #}
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <div class="alert alert-danger mt-3 mb-0" role="alert">
                {{ messages[0] }}
              </div>
            {% endif %}
          {% endwith %}
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
