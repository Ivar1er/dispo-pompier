<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nouveau mot de passe</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">
  <div class="container mt-5">
    <div class="card p-4 mx-auto shadow" style="max-width: 400px;">
      <h4 class="mb-3">Première connexion</h4>
      <p class="small text-muted">
        Veuillez choisir un mot de passe personnel.
      </p>

      <form method="POST">
        <div class="input-group mb-3">
          <input
            type="password"
            name="password"
            id="changePassword"
            class="form-control"
            placeholder="Nouveau mot de passe"
            required
            minlength="6"
          >
          <button
            class="btn btn-outline-secondary"
            type="button"
            data-toggle-password="changePassword"
          >
            Afficher
          </button>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Enregistrer
        </button>
      </form>
    </div>
  </div>

  <script>
    document.querySelectorAll('[data-toggle-password]').forEach((button) => {
      button.addEventListener('click', () => {
        const input = document.getElementById(button.dataset.togglePassword);
        const visible = input.type === 'text';
        input.type = visible ? 'password' : 'text';
        button.textContent = visible ? 'Afficher' : 'Masquer';
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
